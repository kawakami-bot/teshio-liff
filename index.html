<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1"
  >

  <title>天塩町運動教室</title>

  <script
    charset="utf-8"
    src="https://static.line-scdn.net/liff/edge/2/sdk.js">
  </script>
</head>

<body style="
  margin:0;
  padding:18px;
  background:#f6f8f6;
  font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',Arial,sans-serif;
  color:#1f2933;
">

  <div style="
    max-width:420px;
    margin:0 auto;
    background:#ffffff;
    border-radius:18px;
    padding:24px 18px;
    box-shadow:0 4px 14px rgba(0,0,0,0.08);
    text-align:center;
  ">

    <div style="
      color:#168342;
      font-size:18px;
      font-weight:bold;
    ">
      天塩町運動教室
    </div>

    <h1 style="
      font-size:24px;
      margin:16px 0;
    ">
      読み込み中
    </h1>

    <div id="result" style="
      margin-top:18px;
      padding:16px;
      border-radius:14px;
      background:#f5fbf7;
      color:#555;
      line-height:1.7;
      overflow-wrap:anywhere;
    ">
      LINEとの連携を確認しています…
    </div>

  </div>

  <script>
    const LIFF_ID = "2010723158-qng5g55J";

    const APP_URL =
      "https://script.google.com/macros/s/AKfycbzqfZmHIVDyUFogb2h-kLMVmZlgdAPSEJ5L2f7Oxz8bbAgiI8CYdLpZy6V8iBRRAfOF/exec";


    /*
     * URLから指定された項目を取得します。
     *
     * 通常のクエリパラメータと、
     * LIFFが付けるliff.stateの両方を確認します。
     */
    function getUrlParameter(name) {

      const params =
        new URLSearchParams(window.location.search);

      const directValue =
        params.get(name);

      if (directValue) {
        return directValue;
      }

      const liffState =
        params.get("liff.state");

      if (!liffState) {
        return "";
      }

      try {

        const decodedState =
          decodeURIComponent(liffState);

        const stateQuery =
          decodedState.includes("?")
            ? decodedState.split("?")[1]
            : decodedState.replace(/^\?/, "");

        const stateParams =
          new URLSearchParams(stateQuery);

        return stateParams.get(name) || "";

      } catch (error) {

        console.error(
          "liff.stateの読み取りに失敗しました。",
          error
        );

        return "";
      }
    }


    async function startLineLogin() {

      const result =
        document.getElementById("result");

      try {

        await liff.init({
          liffId: LIFF_ID
        });

        if (!liff.isLoggedIn()) {

          result.innerHTML =
            "LINEログイン画面へ移動します…";

          liff.login({
            redirectUri: window.location.href
          });

          return;
        }

        const profile =
          await liff.getProfile();

        if (!profile || !profile.userId) {
          throw new Error(
            "LINEユーザーIDを取得できませんでした。"
          );
        }

        const lineUserId =
          profile.userId;

        const classId =
          getUrlParameter("classId");

        result.innerHTML =
          "<strong style='color:#168342;'>" +
          "LINE連携が完了しました" +
          "</strong><br>" +
          "教室情報を表示します…";

        let nextUrl;

        /*
         * classIdが指定されている場合は、
         * 該当する教室詳細へ直接移動します。
         */
        if (classId) {

          nextUrl =
            APP_URL +
            "?page=detail" +
            "&classId=" +
            encodeURIComponent(classId) +
            "&lineUserId=" +
            encodeURIComponent(lineUserId);

        /*
         * classIdがない通常起動の場合は、
         * 教室一覧へ移動します。
         */
        } else {

          nextUrl =
            APP_URL +
            "?page=classList" +
            "&lineUserId=" +
            encodeURIComponent(lineUserId);
        }

        window.location.replace(nextUrl);

      } catch (error) {

        console.error(error);

        result.innerHTML =
          "<strong style='color:#b42318;'>" +
          "LINE連携に失敗しました" +
          "</strong><br>" +
          String(error.message || error);
      }
    }


    startLineLogin();
  </script>

</body>
</html>
